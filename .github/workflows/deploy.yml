name: Deploy to Oracle Cloud

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USER }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          script: |
            set -e
            cd /opt/smart-backlog

            # Pull latest code
            sudo -u smart-backlog git fetch origin main
            sudo -u smart-backlog git reset --hard origin/main

            # Install/update dependencies
            sudo -u smart-backlog .venv/bin/pip install -r requirements.txt --quiet

            # Restart service
            sudo systemctl restart smart-backlog

            # Verify it started
            sleep 3
            sudo systemctl is-active smart-backlog
